<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      background:#0b1220;
      font-family: Arial, Helvetica, sans-serif;
      color:#e5e7eb;
      padding:24px;
    }
    .card {
      max-width:520px;
      margin:auto;
      background:#111827;
      border:1px solid #374151;
      border-radius:14px;
      overflow:hidden;
    }
    .header {
      padding:16px;
      background:linear-gradient(90deg,#7c3aed,#9333ea);
      color:#fff;
      font-size:18px;
      font-weight:700;
    }
    .content {
      padding:20px;
    }
    .code {
      margin:18px auto;
      padding:14px 18px;
      font-size:28px;
      letter-spacing:8px;
      font-weight:800;
      color:#c4b5fd;
      border:1px dashed #7c3aed;
      width:fit-content;
    }
    .footer {
      padding:12px;
      font-size:12px;
      color:#9ca3af;
      border-top:1px solid #374151;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">SCANSTORY</div>
    <div class="content">
      <p>Hi {{ (user.first_name if user and user.first_name else 'there') }},</p>
      <p>Your verification code is:</p>
      <div class="code">{{ code }}</div>
      <p>This code expires in {{ minutes }} minutes.</p>
    </div>
    <div class="footer">
      © {{ now.year if now else '' }} ScanStory
    </div>
  </div>
</body>
</html>
